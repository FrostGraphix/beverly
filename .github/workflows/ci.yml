name: Production Hardening CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    name: Build and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node runtime
        run: npm run node:verify

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Full release test suite
        run: npm test

      - name: Security audit baseline
        run: npm run security:audit

      - name: Install browser runtime
        run: npx playwright install chromium --with-deps

      - name: Chromium QA
        run: npm run test:browser

      - name: Hardening audit
        run: npm run hardening:audit
