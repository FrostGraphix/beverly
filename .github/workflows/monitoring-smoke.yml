name: Monitoring Smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Override target URL"
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  preview-smoke:
    name: Preview smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.PREVIEW_TARGET_URL != '' || github.event.inputs.target_url != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run preview smoke
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || vars.PREVIEW_TARGET_URL }}
        run: npm run smoke:vercel

  production-uptime:
    name: Production uptime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.PRODUCTION_TARGET_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke
        env:
          TARGET_URL: ${{ vars.PRODUCTION_TARGET_URL }}
        run: npm run smoke:vercel
